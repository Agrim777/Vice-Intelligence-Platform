openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GTA 6 Content Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Article generation and management
  - name: github
    description: GitHub publishing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List all generated articles
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a single article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found

    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /articles/generate:
    post:
      operationId: generateArticle
      tags: [articles]
      summary: Start streaming article generation (SSE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateArticleInput"
      responses:
        "200":
          description: SSE stream of article content
          content:
            text/event-stream:
              schema:
                type: string

  /articles/{id}/publish:
    post:
      operationId: publishArticle
      tags: [articles]
      summary: Publish article to GitHub
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishInput"
      responses:
        "200":
          description: Publish result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResult"

  /articles/stats:
    get:
      operationId: getArticleStats
      tags: [articles]
      summary: Get generation statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleStats"

  /github/branches:
    get:
      operationId: listBranches
      tags: [github]
      summary: List branches in the GitHub repo
      responses:
        "200":
          description: Branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Article:
      type: object
      required: [id, topic, category, status, createdAt]
      properties:
        id:
          type: integer
        topic:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [pending, generating, done, error, published]
        seoTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        wordCount:
          type: ["integer", "null"]
        githubUrl:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    GenerateArticleInput:
      type: object
      required: [topic, category]
      properties:
        topic:
          type: string
        category:
          type: string

    PublishInput:
      type: object
      required: [branch, filename]
      properties:
        branch:
          type: string
        filename:
          type: string
        commitMessage:
          type: ["string", "null"]

    PublishResult:
      type: object
      required: [success, url]
      properties:
        success:
          type: boolean
        url:
          type: string
        message:
          type: ["string", "null"]

    ArticleStats:
      type: object
      required: [total, published, generating, totalWords]
      properties:
        total:
          type: integer
        published:
          type: integer
        generating:
          type: integer
        totalWords:
          type: integer

    Branch:
      type: object
      required: [name]
      properties:
        name:
          type: string
